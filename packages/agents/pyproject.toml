[project]
name = "aqa-agents"
version = "0.1.0"
description = "Five core AI agents (LangGraph-ready stubs) for Autonomous QA Platform"
requires-python = ">=3.11"
dependencies = [
  "aqa-shared",
  "langgraph>=0.2,<1",
  "langchain-core>=0.3,<1",
  "openai>=1.40,<2",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aqa_agents*"]
