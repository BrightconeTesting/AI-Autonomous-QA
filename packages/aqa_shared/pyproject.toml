[project]
name = "aqa-shared"
version = "0.1.0"
description = "Shared enums, Celery constants, and SQLAlchemy models for Autonomous QA Platform"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0,<3",
  "sqlalchemy>=2.0,<3",
  "jsonschema>=4.0,<5",
  "cryptography>=43.0,<45",
  "redis>=5,<6",
]

[tool.setuptools.package-data]
"aqa_shared.validation" = ["schemas/*.json"]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aqa_shared*"]
