<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CIC Hash SPA Fixture</title>
</head>
<body>
  <h1 id="view-title">Home</h1>
  <nav>
    <a href="#/home" id="nav-home">Home</a>
    <a href="#/settings" id="nav-settings">Settings</a>
  </nav>
  <div id="content">Home content</div>
  <script>
    const views = {
      '/home': { title: 'Home', html: '<p>Home content</p>' },
      '/settings': {
        title: 'Settings',
        html: '<p>Settings panel</p><button type="button" id="spa-secret">SPA Secret Action</button>',
      },
    };
    function render() {
      const raw = location.hash.replace(/^#!?/, '') || '/home';
      const view = views[raw] || views['/home'];
      document.getElementById('view-title').textContent = view.title;
      document.getElementById('content').innerHTML = view.html;
    }
    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
